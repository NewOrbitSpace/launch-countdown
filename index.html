<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Countdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="countdown-container">
    <h1 id="title"></h1>
    <p id="subtitle" class="subtitle"></p>
    <div class="countdown" id="countdown" role="timer" aria-live="polite">
      <div class="unit">
        <span class="value" id="days">--</span>
        <span class="label">Days</span>
      </div>
      <div class="unit">
        <span class="value" id="hours">--</span>
        <span class="label">Hours</span>
      </div>
      <div class="unit">
        <span class="value" id="minutes">--</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span class="value" id="seconds">--</span>
        <span class="label">Seconds</span>
      </div>
    </div>
    <p id="launched-message" class="launched-message" hidden></p>
    <p class="target-date" id="target-date"></p>
  </main>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
